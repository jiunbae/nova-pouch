name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.jiun.dev
  IMAGE_NAME: nova-pouch
  IAC_REPO: jiunbae/IaC
  OVERLAY_PROD: kubernetes/overlays/prod/nova-pouch
  OVERLAY_DEV: kubernetes/overlays/dev/nova-pouch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ gitea.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  update-manifests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Clone IaC repo from GitHub
        run: |
          git clone https://x-access-token:${{ secrets.IAC_GITHUB_TOKEN }}@github.com/${{ env.IAC_REPO }}.git iac

      - name: Update image tags in IaC repo
        run: |
          cd iac
          sed -i "s/newTag: .*/newTag: ${{ gitea.sha }}/" ${{ env.OVERLAY_DEV }}/kustomization.yaml
          sed -i "s/newTag: .*/newTag: ${{ gitea.sha }}/" ${{ env.OVERLAY_PROD }}/kustomization.yaml

      - name: Commit and push to IaC repo
        run: |
          cd iac
          git config user.name "Gitea Actions"
          git config user.email "actions@gitea.jiun.dev"
          git add ${{ env.OVERLAY_DEV }}/kustomization.yaml ${{ env.OVERLAY_PROD }}/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(nova-pouch): update image tag to ${{ gitea.sha }}"
          git push
