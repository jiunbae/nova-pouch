name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.jiun.dev
  IMAGE_NAME: nova-pouch
  IAC_REPO: jiunbae/IaC
  APP_PATH: kubernetes/overlays/prod/nova-pouch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and push
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  update-manifests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Clone IaC repo (release branch)
        run: |
          git clone -b release https://x-access-token:${{ secrets.IAC_GITHUB_TOKEN }}@github.com/${{ env.IAC_REPO }}.git iac

      - name: Update image tag
        run: |
          cd iac/${{ env.APP_PATH }}
          sed -i "s/newTag: .*/newTag: ${{ github.sha }}/" kustomization.yaml
          cat kustomization.yaml

      - name: Commit and push
        run: |
          cd iac
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add ${{ env.APP_PATH }}/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(nova-pouch): update image tag to ${{ github.sha }}"
          git push origin release
