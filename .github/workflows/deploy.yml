name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Inject Google Analytics
        if: ${{ vars.GTAG_ID != '' }}
        run: sed -i "s/__GTAG_ID__/${{ vars.GTAG_ID }}/g" dist/index.html

      - name: Inject AdSense
        if: ${{ vars.ADSENSE_CLIENT != '' }}
        run: |
          sed -i "s/__ADSENSE_CLIENT__/${{ vars.ADSENSE_CLIENT }}/g" dist/index.html
          sed -i "s/__ADSENSE_SLOT_COMPLETE__/${{ vars.ADSENSE_SLOT_COMPLETE }}/g" dist/index.html
          sed -i "s/__ADSENSE_SLOT_IDLE__/${{ vars.ADSENSE_SLOT_IDLE }}/g" dist/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
